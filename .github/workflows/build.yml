name: Build Installers

on:
  push:
    tags:
      - "v*.*.*"          # Trigger on version tags: v0.0.0, v1.0.0, etc.
  workflow_dispatch:       # Allow manual trigger from the GitHub Actions UI
    inputs:
      build_target:
        description: "Which platform(s) to build"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos

env:
  PYTHON_VERSION: "3.11"
  APP_VERSION: "0.0.0"

# ─────────────────────────────────────────────────────────────────────────────
# Windows: PyInstaller (one-dir) → Inno Setup → CystoMoto_Setup_v0.0.0.exe
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.build_target == 'all' ||
        github.event.inputs.build_target == 'windows'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: cysto_app/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cysto_app/requirements.txt
          pip install pyinstaller

      - name: Run PyInstaller
        run: pyinstaller CystoMoto.spec --noconfirm

      - name: Verify PyInstaller output
        shell: pwsh
        run: |
          if (!(Test-Path "dist\CystoMoto\CystoMoto.exe")) {
            Write-Error "dist\CystoMoto\CystoMoto.exe not found"
            exit 1
          }
          Write-Host "PyInstaller output verified."

      - name: Install Inno Setup 6
        run: choco install innosetup --version=6.2.2 -y

      - name: Create output directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path installer_output

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\CystoMoto.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CystoMoto-Windows-Installer-v${{ env.APP_VERSION }}
          path: installer_output/CystoMoto_Setup_v${{ env.APP_VERSION }}.exe
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# macOS (Apple Silicon / arm64): PyInstaller BUNDLE → create-dmg → *_arm64.dmg
# ─────────────────────────────────────────────────────────────────────────────
  build-macos-arm64:
    name: Build macOS DMG (Apple Silicon)
    runs-on: macos-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.build_target == 'all' ||
        github.event.inputs.build_target == 'macos'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: cysto_app/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cysto_app/requirements.txt
          pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Run PyInstaller (macOS)
        run: pyinstaller CystoMoto_macos.spec --noconfirm

      - name: Verify .app bundle
        run: |
          if [ ! -d "dist/CystoMoto.app" ]; then
            echo "ERROR: dist/CystoMoto.app not found"
            exit 1
          fi
          echo "App bundle verified."

      - name: Create output directory
        run: mkdir -p installer_output

      - name: Build DMG (arm64)
        run: |
          create-dmg \
            --volname "CystoMoto ${{ env.APP_VERSION }}" \
            --volicon "cysto_app/ui/icons/CystoMoto.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CystoMoto.app" 175 190 \
            --hide-extension "CystoMoto.app" \
            --app-drop-link 425 190 \
            "installer_output/CystoMoto_${{ env.APP_VERSION }}_macOS_arm64.dmg" \
            "dist/"

      - name: Upload macOS arm64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CystoMoto-macOS-arm64-DMG-v${{ env.APP_VERSION }}
          path: installer_output/CystoMoto_${{ env.APP_VERSION }}_macOS_arm64.dmg
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# macOS (Intel / x86_64): same steps on macos-13 (last Intel runner)
# ─────────────────────────────────────────────────────────────────────────────
  build-macos-x86_64:
    name: Build macOS DMG (Intel)
    runs-on: macos-13
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.build_target == 'all' ||
        github.event.inputs.build_target == 'macos'))

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: cysto_app/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cysto_app/requirements.txt
          pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Run PyInstaller (macOS)
        run: pyinstaller CystoMoto_macos.spec --noconfirm

      - name: Verify .app bundle
        run: |
          if [ ! -d "dist/CystoMoto.app" ]; then
            echo "ERROR: dist/CystoMoto.app not found"
            exit 1
          fi
          echo "App bundle verified."

      - name: Create output directory
        run: mkdir -p installer_output

      - name: Build DMG (x86_64)
        run: |
          create-dmg \
            --volname "CystoMoto ${{ env.APP_VERSION }}" \
            --volicon "cysto_app/ui/icons/CystoMoto.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "CystoMoto.app" 175 190 \
            --hide-extension "CystoMoto.app" \
            --app-drop-link 425 190 \
            "installer_output/CystoMoto_${{ env.APP_VERSION }}_macOS_x86_64.dmg" \
            "dist/"

      - name: Upload macOS x86_64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: CystoMoto-macOS-x86_64-DMG-v${{ env.APP_VERSION }}
          path: installer_output/CystoMoto_${{ env.APP_VERSION }}_macOS_x86_64.dmg
          if-no-files-found: error
          retention-days: 30

# ─────────────────────────────────────────────────────────────────────────────
# Release: Create a draft GitHub Release with all 3 installers attached.
# Only runs on version tag pushes (v*.*.*), after all 3 builds succeed.
# ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos-arm64, build-macos-x86_64]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CystoMoto-Windows-Installer-v${{ env.APP_VERSION }}
          path: release_assets/

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: CystoMoto-macOS-arm64-DMG-v${{ env.APP_VERSION }}
          path: release_assets/

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: CystoMoto-macOS-x86_64-DMG-v${{ env.APP_VERSION }}
          path: release_assets/

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CystoMoto v${{ env.APP_VERSION }}
          draft: true
          prerelease: false
          files: |
            release_assets/CystoMoto_Setup_v${{ env.APP_VERSION }}.exe
            release_assets/CystoMoto_${{ env.APP_VERSION }}_macOS_arm64.dmg
            release_assets/CystoMoto_${{ env.APP_VERSION }}_macOS_x86_64.dmg
          body: |
            ## CystoMoto v${{ env.APP_VERSION }}

            ### Installation

            **Windows**
            Download and run `CystoMoto_Setup_v${{ env.APP_VERSION }}.exe`.
            > Note: Windows SmartScreen may show a warning for unsigned apps — click "More info → Run anyway".

            **macOS (Apple Silicon — M1/M2/M3)**
            Download `CystoMoto_${{ env.APP_VERSION }}_macOS_arm64.dmg`, open it, and drag CystoMoto to Applications.

            **macOS (Intel)**
            Download `CystoMoto_${{ env.APP_VERSION }}_macOS_x86_64.dmg`, open it, and drag CystoMoto to Applications.

            > Note: On macOS, right-click the app and choose "Open" the first time to bypass Gatekeeper (unsigned app).

            ### Changes
            - Initial release
